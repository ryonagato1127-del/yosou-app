<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Fight Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
 background:#0f172a;
 color:#fff;
 font-family:sans-serif;
 padding:20px;
}

.card{
 background:#1e293b;
 padding:15px;
 border-radius:12px;
 margin-bottom:10px;
 cursor:grab;
}

.dragging{
 opacity:0.5;
}

button{
 background:#3b82f6;
 color:#fff;
 border:none;
 padding:8px;
 border-radius:8px;
 margin:3px;
}

.player-btn{ background:#334155; }
.active{ background:#22c55e !important; }

input, textarea{
 width:100%;
 margin:5px 0;
 padding:8px;
 border-radius:8px;
}
</style>
</head>

<body>

<h2>🔥 Fight Predictor</h2>

<input id="name0" placeholder="プレイヤー1">
<input id="name1" placeholder="プレイヤー2">
<input id="name2" placeholder="プレイヤー3">
<input id="name3" placeholder="プレイヤー4">

<input type="file" id="img">
<button onclick="ocr()">画像読み込み</button>

<textarea id="matches"></textarea>
<button onclick="build()">生成</button>

<div id="fights"></div>

<script>
let data=[];
let dragSrc=null;

function getNames(){
 return [
  name0.value||"P1",
  name1.value||"P2",
  name2.value||"P3",
  name3.value||"P4"
 ];
}

async function ocr(){
 let file=img.files[0];
 if(!file)return;

 let result=await Tesseract.recognize(file,'jpn+eng');
 let text=result.data.text;

 let lines=text.match(/[^\n]+?(vs|VS|対)[^\n]+/g)||[];
 matches.value=lines.join("\\n");
}

function build(){
 data=[];
 let container=fights;
 container.innerHTML="";

 let names=getNames();
 let lines=matches.value.split("\\n");

 lines.forEach((line,i)=>{
  if(!line.match(/vs|VS|対/))return;

  let [a,b]=line.split(/vs|VS|対/);
  a=a.trim(); b=b.trim();

  data.push({a,b,picks:[null,null,null,null]});

  let div=createCard(i,a,b,names);
  container.appendChild(div);
 });
}

function createCard(i,a,b,names){
 let div=document.createElement("div");
 div.className="card";
 div.draggable=true;

 div.innerHTML=`
 <div><b>${a} vs ${b}</b></div>
 ${[0,1,2,3].map(p=>`
  <div>
   ${names[p]}：
   <button class="player-btn" onclick="pick(${i},${p},'${a}',this)">${a}</button>
   <button class="player-btn" onclick="pick(${i},${p},'${b}',this)">${b}</button>
  </div>
 `).join("")}
 `;

 // ドラッグ処理
 div.addEventListener("dragstart",()=>{
  dragSrc=div;
  div.classList.add("dragging");
 });

 div.addEventListener("dragend",()=>{
  div.classList.remove("dragging");
 });

 div.addEventListener("dragover",(e)=>{
  e.preventDefault();
 });

 div.addEventListener("drop",()=>{
  if(dragSrc!==div){
   let parent=div.parentNode;
   parent.insertBefore(dragSrc,div);
  }
 });

 return div;
}

function pick(i,p,name,btn){
 data[i].picks[p]=name;
 let parent=btn.parentElement;
 parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}
</script>

</body>
</html>
