<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勝敗予想</title>

<style>
body{
 background:#0f172a;
 color:#fff;
 font-family:sans-serif;
 margin:0;
 padding:15px;
}

/* トップ画像 */
.hero{
 width:100%;
 height:160px;
 background:url('https://images.unsplash.com/photo-1517649763962-0c623066013b') center/cover;
 border-radius:12px;
 margin-bottom:15px;
}

h1{
 text-align:center;
 font-size:20px;
 margin-bottom:10px;
}

.card{
 background:#1e293b;
 padding:12px;
 border-radius:12px;
 margin-bottom:10px;
}

button{
 background:#3b82f6;
 color:#fff;
 border:none;
 padding:8px;
 border-radius:8px;
 margin:3px;
 font-size:12px;
}

.player-btn{ background:#334155; }
.active{ background:#22c55e !important; }
.winner-btn{ background:#f59e0b; }

input, textarea{
 width:100%;
 margin:5px 0;
 padding:10px;
 border-radius:8px;
 border:none;
 font-size:14px;
}

textarea{ height:120px; }

.rank{
 background:#111827;
 padding:10px;
 border-radius:10px;
 margin-top:15px;
}

.section{
 margin-bottom:15px;
}
</style>
</head>

<body>

<div class="hero"></div>

<h1>🔥 勝敗予想</h1>

<div class="section">
<input id="name0" placeholder="プレイヤー1">
<input id="name1" placeholder="プレイヤー2">
<input id="name2" placeholder="プレイヤー3">
<input id="name3" placeholder="プレイヤー4">
</div>

<div class="section">
<textarea id="matches" placeholder="例：
朝倉未来 vs 平本蓮
堀江圭功 vs ○○"></textarea>
<button onclick="build()">シート生成</button>
</div>

<div id="fights"></div>

<button onclick="calc()">ランキング表示</button>

<div id="ranking" class="rank"></div>

<script>
let data=[];

function getNames(){
 return [
  name0.value || "P1",
  name1.value || "P2",
  name2.value || "P3",
  name3.value || "P4"
 ];
}

function build(){
 fights.innerHTML="";
 data=[];

 let names=getNames();
 let lines=matches.value.split("\\n").filter(l=>l.trim()!="");

 lines.forEach((line,i)=>{
  if(!line.includes("vs")) return;

  let [a,b]=line.split("vs");
  a=a.trim(); b=b.trim();

  data.push({a,b,picks:[null,null,null,null],winner:null});

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <div><b>${i+1}. ${a} vs ${b}</b></div>

    ${[0,1,2,3].map(p=>`
      <div>
        ${names[p]}：
        <button class="player-btn" onclick="pick(${i},${p},'${a}',this)">${a}</button>
        <button class="player-btn" onclick="pick(${i},${p},'${b}',this)">${b}</button>
      </div>
    `).join("")}

    <div>
      勝者：
      <button class="winner-btn" onclick="setWinner(${i},'${a}',this)">${a}</button>
      <button class="winner-btn" onclick="setWinner(${i},'${b}',this)">${b}</button>
    </div>
  `;

  fights.appendChild(div);
 });
}

function pick(i,p,name,btn){
 data[i].picks[p]=name;
 let parent=btn.parentElement;
 parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

function setWinner(i,name,btn){
 data[i].winner=name;
 let parent=btn.parentElement;
 parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

function calc(){
 let scores=[0,0,0,0];

 data.forEach(match=>{
  match.picks.forEach((p,i)=>{
    if(p===match.winner){
      scores[i]++;
    }
  });
 });

 let names=getNames();

 let result = names.map((n,i)=>({name:n,score:scores[i]}))
   .sort((a,b)=>b.score-a.score);

 ranking.innerHTML = "<h3>🏆 ランキング</h3>" +
   result.map((r,i)=>`${i+1}位：${r.name}（${r.score}勝）`).join("<br>");
}
</script>

</body>
</html>
