<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>予想アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
body{font-family:sans-serif;padding:20px}
textarea{width:100%;height:100px}
table{border-collapse:collapse;width:100%;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
select{width:100%}
button{margin:5px;padding:10px}
</style>
</head>
<body>

<h1>🔥 予想アプリ</h1>

<input type="file" id="img">
<button onclick="ocr()">画像から抽出</button>

<p>試合カード（修正OK）</p>
<textarea id="matches"></textarea>
<button onclick="build()">シート生成</button>

<br>名前：
<input id="n1" placeholder="人1">
<input id="n2" placeholder="人2">
<input id="n3" placeholder="人3">
<input id="n4" placeholder="人4">

<table id="t"></table>

<button onclick="share()">共有URL作成</button>
<p id="url"></p>

<script>
async function ocr(){
 let f=img.files[0];
 if(!f)return alert("画像選んで");
 let r=await Tesseract.recognize(f,'jpn+eng');
 let lines=r.data.text.split("\\n").filter(l=>l.match(/vs|VS|対/));
 matches.value=lines.join("\\n");
}

function build(){
 t.innerHTML="<tr><th>試合</th><th>1</th><th>2</th><th>3</th><th>4</th></tr>";
 let lines=matches.value.split("\\n");
 lines.forEach(line=>{
  if(!line.match(/vs|VS|対/))return;
  let [a,b]=line.split(/vs|VS|対/);
  let row="<tr><td>"+line+"</td>";
  for(let i=0;i<4;i++){
   row+=`<td><select><option></option><option>${a}</option><option>${b}</option></select></td>`;
  }
  row+="</tr>";
  t.innerHTML+=row;
 });
}

function share(){
 let data={
  names:[n1.value,n2.value,n3.value,n4.value],
  matches:matches.value,
  picks:[...document.querySelectorAll("select")].map(s=>s.value)
 };
 let enc=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
 let url=location.href.split("#")[0]+"#"+enc;
 document.getElementById("url").innerHTML="<a href='"+url+"'>"+url+"</a>";
}

if(location.hash){
 try{
  let d=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(1)))));
  matches.value=d.matches;
  [n1.value,n2.value,n3.value,n4.value]=d.names;
  build();
  let sels=document.querySelectorAll("select");
  sels.forEach((s,i)=>s.value=d.picks[i]||"");
 }catch(e){}
}
</script>

</body>
</html>
