<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勝敗予想</title>

<style>
body{
 background:#0b0f1a;
 color:#fff;
 font-family:-apple-system, BlinkMacSystemFont, sans-serif;
 margin:0;
 padding:15px;
}

/* トップ */
.hero{
 width:100%;
 height:170px;
 background:#111;
 background-size:cover;
 background-position:center;
 border-radius:14px;
 margin-bottom:10px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:12px;
 color:#aaa;
}

h1{
 text-align:center;
 color:#ef4444;
}

.card{
 background:#111827;
 padding:10px;
 border-radius:12px;
 margin-bottom:10px;
}

/* 行 */
.line{
 display:flex;
 align-items:center;
 gap:6px;
 white-space:nowrap;
 overflow-x:auto;
 margin-bottom:4px;
}

button{
 border:none;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
}

.player-btn{ background:#1f2937; color:#fff; }
.active{ background:#22c55e !important; }
.winner-btn{ background:#ef4444; color:#fff; }

input, textarea{
 width:100%;
 margin:5px 0;
 padding:10px;
 border-radius:8px;
 border:none;
}

.rank{
 background:#020617;
 padding:10px;
 border-radius:10px;
 margin-top:15px;
}
</style>
</head>

<body>

<div id="hero" class="hero">画像を選択</div>
<input type="file" accept="image/*" onchange="setHero(event)">

<h1>FIGHT PREDICTION</h1>

<input id="name0" placeholder="プレイヤー1">
<input id="name1" placeholder="プレイヤー2">
<input id="name2" placeholder="プレイヤー3">
<input id="name3" placeholder="プレイヤー4">

<textarea id="matches" placeholder="朝倉未来 vs 平本蓮"></textarea>

<button onclick="build()">シート生成</button>

<div id="fights"></div>

<button onclick="calc()">ランキング表示</button>
<div id="ranking" class="rank"></div>

<script>
let data=[];

// 🔥 トップ画像
function setHero(e){
 let file=e.target.files[0];
 if(!file)return;

 let reader=new FileReader();
 reader.onload=function(ev){
  hero.style.backgroundImage=`url(${ev.target.result})`;
  hero.innerText="";
 }
 reader.readAsDataURL(file);
}

function getNames(){
 return [
  name0.value || "P1",
  name1.value || "P2",
  name2.value || "P3",
  name3.value || "P4"
 ];
}

function parseLine(line){
 let clean=line.trim().replace(/\s+/g," ");
 let parts=clean.split(/vs|VS|ｖｓ|対/);
 if(parts.length<2)return null;
 return [parts[0].trim(),parts[1].trim()];
}

// 🔥 シート生成（順番逆）
function build(){
 fights.innerHTML="";
 data=[];

 let names=getNames();
 let lines=matches.value.split("\n").filter(l=>l.trim());

 lines.reverse(); // ←ここ重要

 lines.forEach((line,i)=>{
  let parsed=parseLine(line);
  if(!parsed)return;

  let [a,b]=parsed;

  data.push({a,b,picks:[null,null,null,null],winner:null});

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <div class="line"><b>${i+1}. ${a} vs ${b}</b></div>

    ${[0,1,2,3].map(p=>`
      <div class="line">
        ${names[p]}
        <button class="player-btn" onclick="pick(${i},${p},'${a}',this)">${a}</button>
        <button class="player-btn" onclick="pick(${i},${p},'${b}',this)">${b}</button>
      </div>
    `).join("")}

    <div class="line">
      勝者
      <button class="winner-btn" onclick="setWinner(${i},'${a}',this)">${a}</button>
      <button class="winner-btn" onclick="setWinner(${i},'${b}',this)">${b}</button>
    </div>
  `;

  fights.appendChild(div);
 });
}

function pick(i,p,name,btn){
 data[i].picks[p]=name;
 btn.parentElement.querySelectorAll(".player-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

function setWinner(i,name,btn){
 data[i].winner=name;
 btn.parentElement.querySelectorAll(".winner-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

// 🔥 ランキング＋的中率
function calc(){
 let scores=[0,0,0,0];
 let total=data.length;

 data.forEach(match=>{
  match.picks.forEach((p,i)=>{
    if(p===match.winner) scores[i]++;
  });
 });

 let names=getNames();

 let result=names.map((n,i)=>{
   let rate = total ? Math.round((scores[i]/total)*100) : 0;
   return {name:n,score:scores[i],rate};
 }).sort((a,b)=>b.score-a.score);

 ranking.innerHTML="<h3>🏆 ランキング</h3>"+
 result.map((r,i)=>
   (i===0 ? "🥇 " : `${i+1}位：`) +
   `${r.name}（${r.score}勝 / ${r.rate}%）`
 ).join("<br>");
}
</script>

</body>
</html>
