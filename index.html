<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е‹ќж•—дє€жѓі</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">

<style>
body{
 background:#0b0f1a;
 color:#fff;
 font-family:-apple-system, BlinkMacSystemFont, sans-serif;
 margin:0;
 padding:15px;
}

.hero{
 position:relative;
 width:100%;
 height:180px;
 background:#000;
 background-size:contain;
 background-repeat:no-repeat;
 background-position:center;
 border-radius:14px;
 margin-bottom:10px;
}

.title{
 position:absolute;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
 font-size:clamp(32px, 8vw, 48px);
 font-family:'Noto Sans JP', sans-serif;
 font-weight:900;
 letter-spacing:6px;
 background:linear-gradient(90deg,#ef4444,#f97316);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
 text-shadow:0 2px 12px rgba(0,0,0,0.9);
}

.card{
 background:#111827;
 padding:10px;
 border-radius:12px;
 margin-bottom:10px;
}

.line{
 display:flex;
 align-items:center;
 gap:6px;
 white-space:nowrap;
 overflow-x:auto;
 margin-bottom:4px;
}

button{
 border:none;
 padding:6px 10px;
 border-radius:8px;
 font-size:12px;
}

.player-btn{ background:#1f2937; color:#fff; }
.active{ background:#22c55e !important; }
.winner-btn{ background:#ef4444; color:#fff; }

input, textarea{
 width:100%;
 margin:5px 0;
 padding:10px;
 border-radius:8px;
 border:none;
}

.rank{
 background:#020617;
 padding:10px;
 border-radius:10px;
 margin:10px 0;
}
</style>
</head>

<body>

<div id="hero" class="hero">
  <div class="title">е‹ќж•—дє€жѓі</div>
</div>

<input type="file" accept="image/*" onchange="setHero(event)">

<input id="name0" placeholder="гѓ—гѓ¬г‚¤гѓ¤гѓј1">
<input id="name1" placeholder="гѓ—гѓ¬г‚¤гѓ¤гѓј2">
<input id="name2" placeholder="гѓ—гѓ¬г‚¤гѓ¤гѓј3">
<input id="name3" placeholder="гѓ—гѓ¬г‚¤гѓ¤гѓј4">

<textarea id="matches"></textarea>

<button onclick="build()">г‚·гѓјгѓ€з”џж€ђ</button>

<div id="ranking" class="rank"></div>
<button onclick="calc()">гѓ©гѓіг‚­гѓіг‚°ж›ґж–°</button>

<button onclick="share()">е…±жњ‰URLдЅњж€ђ</button>
<input id="shareUrl" readonly>

<div id="fights"></div>

<script>
let data=[];

/* з”»еѓЏ */
function setHero(e){
 let file=e.target.files[0];
 if(!file)return;

 let reader=new FileReader();
 reader.onload=ev=>{
  hero.dataset.img = ev.target.result;
  hero.style.backgroundImage=`url(${ev.target.result})`;
 };
 reader.readAsDataURL(file);
}

function getNames(){
 return [name0.value,name1.value,name2.value,name3.value];
}

function parseLine(line){
 let clean=line.trim().replace(/\s+/g," ");
 let parts=clean.split(/vs|VS|пЅ–пЅ“|еЇѕ/);
 if(parts.length<2)return null;
 return [parts[0].trim(),parts[1].trim()];
}

/* г‚·гѓјгѓ€з”џж€ђ */
function build(){
 fights.innerHTML="";
 data=[];

 let names=getNames();
 let lines=matches.value.split("\n").filter(l=>l.trim());
 let total=lines.length;

 lines.forEach((line,i)=>{
  let parsed=parseLine(line);
  if(!parsed)return;

  let [a,b]=parsed;

  data.push({a,b,picks:[null,null,null,null],winner:null});

  let num = total - i;

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <div class="line"><b>${num}. ${a} vs ${b}</b></div>

    ${[0,1,2,3].map(p=>`
      <div class="line">
        ${names[p]||"P"+(p+1)}
        <button class="player-btn" onclick="pick(${i},${p},'${a}',this)">${a}</button>
        <button class="player-btn" onclick="pick(${i},${p},'${b}',this)">${b}</button>
      </div>
    `).join("")}

    <div class="line">
      е‹ќиЂ…
      <button class="winner-btn" onclick="setWinner(${i},'${a}',this)">${a}</button>
      <button class="winner-btn" onclick="setWinner(${i},'${b}',this)">${b}</button>
    </div>
  `;

  fights.appendChild(div);
 });
}

/* дє€жѓі */
function pick(i,p,name,btn){
 data[i].picks[p]=name;
 btn.parentElement.querySelectorAll(".player-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* е‹ќиЂ… */
function setWinner(i,name,btn){
 data[i].winner=name;
 btn.parentElement.querySelectorAll(".winner-btn").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* гѓ©гѓіг‚­гѓіг‚° */
function calc(){
 let scores=[0,0,0,0];
 let valid=0;

 data.forEach(m=>{
  if(!m.winner)return;
  valid++;
  m.picks.forEach((p,i)=>{
    if(p===m.winner)scores[i]++;
  });
 });

 let names=getNames();

 let result=names.map((n,i)=>{
   let rate=valid?Math.round(scores[i]/valid*100):0;
   return {name:n||"P"+(i+1),score:scores[i],rate};
 }).sort((a,b)=>b.score-a.score);

 let rank=0,prev=null;

 ranking.innerHTML="<h3>рџЏ† гѓ©гѓіг‚­гѓіг‚°</h3>"+
 result.map((r,i)=>{
  if(r.score!==prev) rank=i+1;
  prev=r.score;

  let medal = rank==1?"рџҐ‡ ":rank==2?"рџҐ€ ":rank==3?"рџҐ‰ ":`${rank}дЅЌпјљ`;
  return `${medal}${r.name}пј€${r.score}е‹ќ / ${r.rate}%пј‰`;
 }).join("<br>");
}

/* е…±жњ‰ */
function share(){
 let payload={
  names:getNames(),
  matches:matches.value,
  data:data,
  img:hero.dataset.img||""
 };

 let url=location.href.split("#")[0]+"#"+btoa(JSON.stringify(payload));
 shareUrl.value=url;
}

/* UIеѕ©е…ѓ */
function restoreUI(){
 data.forEach((match,i)=>{
  let card=fights.children[i];
  if(!card)return;

  let lines=card.querySelectorAll(".line");

  match.picks.forEach((pick,p)=>{
    if(!pick)return;
    let btns=lines[p+1].querySelectorAll(".player-btn");
    btns.forEach(b=>{
      if(b.innerText===pick) b.classList.add("active");
    });
  });

  if(match.winner){
    let btns=lines[lines.length-1].querySelectorAll(".winner-btn");
    btns.forEach(b=>{
      if(b.innerText===match.winner) b.classList.add("active");
    });
  }
 });
}

/* еѕ©е…ѓ */
if(location.hash){
 try{
  let d=JSON.parse(atob(location.hash.slice(1)));

  [name0.value,name1.value,name2.value,name3.value]=d.names;
  matches.value=d.matches;

  if(d.img){
    hero.style.backgroundImage=`url(${d.img})`;
    hero.dataset.img=d.img;
  }

  data=d.data;
  build();
  restoreUI();

 }catch(e){}
}
</script>

</body>
</html>
