<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勝敗予想</title>

<style>
body{
 background:#0b0f1a;
 color:#fff;
 font-family:-apple-system, BlinkMacSystemFont, sans-serif;
 margin:0;
 padding:15px;
}

/* 🔥 RIZIN風トップ */
.hero{
 width:100%;
 height:170px;
 background:
 linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
 url('https://images.unsplash.com/photo-1552072092-7f9b8d63efcb') center/cover;
 border-radius:14px;
 margin-bottom:15px;
 box-shadow:0 0 20px rgba(239,68,68,0.3);
}

/* タイトル */
h1{
 text-align:center;
 font-size:20px;
 color:#ef4444;
 letter-spacing:2px;
 margin-bottom:10px;
}

/* カード */
.card{
 background:#111827;
 padding:12px;
 border-radius:12px;
 margin-bottom:10px;
 box-shadow:0 0 10px rgba(239,68,68,0.15);
}

/* ボタン */
button{
 border:none;
 padding:8px;
 border-radius:8px;
 margin:3px;
 font-size:12px;
}

.player-btn{ background:#1f2937; color:#fff; }
.active{ background:#22c55e !important; }
.winner-btn{ background:#ef4444; color:#fff; }

input, textarea{
 width:100%;
 margin:5px 0;
 padding:10px;
 border-radius:8px;
 border:none;
 font-size:14px;
}

textarea{ height:120px; }

.rank{
 background:#020617;
 padding:10px;
 border-radius:10px;
 margin-top:15px;
 border:1px solid rgba(239,68,68,0.2);
}
</style>
</head>

<body>

<div class="hero"></div>

<h1>FIGHT PREDICTION</h1>

<input id="name0" placeholder="プレイヤー1">
<input id="name1" placeholder="プレイヤー2">
<input id="name2" placeholder="プレイヤー3">
<input id="name3" placeholder="プレイヤー4">

<textarea id="matches" placeholder="例：
朝倉未来 vs 平本蓮
堀江圭功 vs ○○"></textarea>

<button onclick="build()">シート生成</button>

<div id="fights"></div>

<button onclick="calc()">ランキング表示</button>

<div id="ranking" class="rank"></div>

<script>
let data=[];

function getNames(){
 return [
  name0.value || "P1",
  name1.value || "P2",
  name2.value || "P3",
  name3.value || "P4"
 ];
}

/* 🔥 安定パース */
function parseLine(line){
 let clean = line.trim().replace(/\s+/g," ");
 let parts = clean.split(/vs|VS|ｖｓ|対/);
 if(parts.length < 2) return null;
 return [parts[0].trim(), parts[1].trim()];
}

/* シート生成 */
function build(){
 fights.innerHTML="";
 data=[];

 let names=getNames();
 let lines=matches.value.split("\n");

 lines.forEach((line)=>{
  if(!line.trim()) return;

  let parsed = parseLine(line);
  if(!parsed) return;

  let [a,b] = parsed;

  let index = data.length;

  data.push({a,b,picks:[null,null,null,null],winner:null});

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <div><b>${index+1}. ${a} vs ${b}</b></div>

    ${[0,1,2,3].map(p=>`
      <div>
        ${names[p]}：
        <button class="player-btn" onclick="pick(${index},${p},'${a}',this)">${a}</button>
        <button class="player-btn" onclick="pick(${index},${p},'${b}',this)">${b}</button>
      </div>
    `).join("")}

    <div>
      勝者：
      <button class="winner-btn" onclick="setWinner(${index},'${a}',this)">${a}</button>
      <button class="winner-btn" onclick="setWinner(${index},'${b}',this)">${b}</button>
    </div>
  `;

  fights.appendChild(div);
 });
}

/* 予想 */
function pick(i,p,name,btn){
 data[i].picks[p]=name;
 let parent=btn.parentElement;
 parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* 勝者 */
function setWinner(i,name,btn){
 data[i].winner=name;
 let parent=btn.parentElement;
 parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* ランキング */
function calc(){
 let scores=[0,0,0,0];

 data.forEach(match=>{
  match.picks.forEach((p,i)=>{
    if(p===match.winner){
      scores[i]++;
    }
  });
 });

 let names=getNames();

 let result = names.map((n,i)=>({name:n,score:scores[i]}))
   .sort((a,b)=>b.score-a.score);

 ranking.innerHTML = "<h3>🏆 ランキング</h3>" +
   result.map((r,i)=>`${i+1}位：${r.name}（${r.score}勝）`).join("<br>");
}
</script>

</body>
</html>
